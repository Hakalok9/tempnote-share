<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0b141c">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src https://api.neytes.space; img-src 'self'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; base-uri 'none'; form-action 'self'">
  <title>Смена пароля — Neytes</title>
  <link rel="icon" href="../assets/app_icon.ico">
  <style>
    :root{color-scheme:dark;--bg:#08121a;--panel:#0e1c26;--line:#213844;--text:#e6eef2;--muted:#91a4ae;--accent:#1fc7bb;--danger:#ff667d;--ok:#63dfbb}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 50% 18%,#123b49,transparent 38%),var(--bg);color:var(--text);font:15px/1.55 Inter,Segoe UI,Arial,sans-serif;padding:24px}.card{width:min(440px,100%);border:1px solid var(--line);border-radius:16px;background:#0b1821eb;padding:30px;box-shadow:0 30px 90px #0008}.brand{display:flex;align-items:center;justify-content:center;gap:10px;font-size:20px;font-weight:750}.brand img{width:32px;height:32px}h1{text-align:center;font-size:25px;margin:20px 0 8px}.intro{text-align:center;color:var(--muted);margin:0 0 22px}.field{margin:13px 0}label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}input{width:100%;background:#0b151c;border:1px solid var(--line);border-radius:8px;padding:12px;color:var(--text);font:inherit;outline:none}input:focus{border-color:var(--accent);box-shadow:0 0 0 3px #1fc7bb1c}button{width:100%;margin-top:12px;border:0;border-radius:8px;padding:12px;background:var(--accent);color:#04201d;font-weight:750;font:inherit;cursor:pointer}button:disabled{opacity:.55;cursor:wait}.message{display:none;border:1px solid;border-radius:9px;padding:12px;margin-top:16px}.message.error{display:block;color:#ff9bad;border-color:#6f2d3c;background:#351722}.message.success{display:block;color:var(--ok);border-color:#245b4d;background:#102d27}.warning{color:var(--muted);font-size:12px;margin-top:16px}.back{display:block;text-align:center;color:var(--muted);margin-top:20px;text-decoration:none}.hidden{display:none}
  </style>
</head>
<body>
  <main class="card"><div class="brand"><img src="../assets/neytes_mark.svg" alt=""><span>Neytes</span></div><div id="form-view"><h1>Установите новый пароль</h1><p class="intro">Ссылка одноразовая и действует 30 минут.</p><form id="reset-form"><div class="field"><label for="password">Новый пароль</label><input id="password" type="password" minlength="8" autocomplete="new-password" required></div><div class="field"><label for="confirmation">Повторите пароль</label><input id="confirmation" type="password" minlength="8" autocomplete="new-password" required></div><button id="submit" type="submit">Изменить пароль</button></form><div id="message" class="message" role="status"></div><p class="warning">После смены пароля Neytes попросит recovery key, чтобы открыть ранее зашифрованные заметки.</p></div><div id="success-view" class="hidden"><h1>Пароль изменён</h1><p class="intro">Откройте Neytes и войдите с новым паролем. Для старых заметок потребуется сохранённый recovery key.</p></div><a class="back" href="/">На главную</a></main>
  <script>
    const params=new URLSearchParams(location.search);const token=params.get('token')||'';history.replaceState({},document.title,location.pathname);const form=document.getElementById('reset-form');const message=document.getElementById('message');const submit=document.getElementById('submit');
    function show(text,type='error'){message.textContent=text;message.className='message '+type}
    if(!token){form.classList.add('hidden');show('Ссылка недействительна или повреждена. Запросите новую ссылку в приложении.')}
    form.addEventListener('submit',async(e)=>{e.preventDefault();const password=document.getElementById('password').value;const confirmation=document.getElementById('confirmation').value;if(password.length<8){show('Пароль должен содержать не менее 8 символов.');return}if(password!==confirmation){show('Пароли не совпадают.');return}submit.disabled=true;message.className='message';try{const response=await fetch('https://api.neytes.space/auth/password-reset/confirm',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,new_password:password})});const data=await response.json().catch(()=>({}));if(!response.ok){throw new Error(data.error==='invalid_or_expired_reset_link'?'Ссылка истекла или уже использована. Запросите новую в приложении.':'Не удалось изменить пароль. Попробуйте ещё раз.')}document.getElementById('form-view').classList.add('hidden');document.getElementById('success-view').classList.remove('hidden')}catch(error){show(error.message||'Ошибка соединения с сервером.');submit.disabled=false}});
  </script>
</body>
</html>
